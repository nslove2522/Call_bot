name: Deploy to VPS via SSH

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload repository to server
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "."
          target: "/tmp/call_bot_deploy"

      - name: Run deploy script on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            chmod +x /tmp/call_bot_deploy/deploy/vps-deploy.sh || true
            sudo bash /tmp/call_bot_deploy/deploy/vps-deploy.sh ${{ secrets.DOMAIN }} ${{ secrets.REPO_URL }} ${{ secrets.BRANCH }}
